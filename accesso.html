<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accesso - Volontariato Sanitario</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="content">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-lg-5">
                    <h1 class="text-center mb-4">
                        <i class="fas fa-sign-in-alt text-primary me-3"></i>ACCESSO
                    </h1>

                    <div class="card border-0 shadow-lg">
                        <div class="card-body p-4">
                            <h2 class="text-primary mb-4 text-center">
                                <i class="fas fa-user-circle me-2"></i>Bentornato!
                            </h2>
                            <p class="text-center mb-4">Inserisci le tue credenziali per accedere alla tua area riservata.</p>

                            <form id="login-form">
                                <div class="mb-3">
                                    <label for="email" class="form-label">
                                        <i class="fas fa-envelope text-primary me-2"></i>Email *
                                    </label>
                                    <input type="email" class="form-control form-control-lg" id="email" required
                                           placeholder="esempio@email.com">
                                </div>

                                <div class="mb-4">
                                    <label for="psswd" class="form-label">
                                        <i class="fas fa-lock text-primary me-2"></i>Password *
                                    </label>
                                    <input type="password" class="form-control form-control-lg" id="psswd" required
                                           placeholder="Inserisci la tua password">
                                </div>

                                <div class="text-center">
                                    <button type="submit" class="btn btn-primary btn-lg px-5" id="btn-login">
                                        <i class="fas fa-sign-in-alt me-2"></i>Accedi
                                    </button>
                                </div>

                                <div id="messaggio-risposta" class="mt-3" style="display: none;"></div>
                            </form>

                            <hr class="my-4">
                            <p class="text-center mb-0">
                                Non hai ancora un account? 
                                <a href="registrazione.html" class="text-primary fw-bold">Registrati qui</a>
                            </p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/js/bootstrap.bundle.min.js"></script>
</body>
</html>
